<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CNC Calculator — Offline</title>
  <meta name="theme-color" content="#0f0f0d" />
  <style>
    :root {
      --bg:      #0f0f0d;
      --text:    #e2ddd4;
      --muted:   #8b8680;
      --accent:  #c8a84b;
      --border:  #2e2e2a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      padding-bottom: max(2rem, env(safe-area-inset-bottom, 2rem));
    }
    .card {
      max-width: 380px;
      text-align: center;
    }
    .icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.5rem;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }
    p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 1.25rem;
    }
    .accent { color: var(--accent); }
    button {
      appearance: none;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 14px 24px;
      font-size: 13px;
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      min-height: 48px;
      width: 100%;
    }
    button:active { transform: scale(0.99); }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
      <rect width="512" height="512" rx="96" fill="#1f1f1c"/>
      <circle cx="256" cy="256" r="160" fill="none" stroke="#2e2e2a" stroke-width="16"/>
      <circle cx="256" cy="256" r="56" fill="#1f1f1c" stroke="#3e3e38" stroke-width="10"/>
      <circle cx="256" cy="256" r="22" fill="#c8a84b"/>
    </svg>
    <h1>You're offline</h1>
    <p>The CNC calculator is cached for offline use, but it hasn't been loaded on this device yet. Connect to a network and reload to download the app — after that, it'll work without internet.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
