<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f0f0d"/>
  <!-- Lathe chuck stylized as concentric rings with cutter -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#2e2e2a" stroke-width="16"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#2e2e2a" stroke-width="12"/>
  <circle cx="256" cy="256" r="56"  fill="#1f1f1c" stroke="#3e3e38" stroke-width="10"/>
  <!-- Three chuck jaws -->
  <rect x="244" y="82"  width="24" height="52" rx="6" fill="#c8a84b" transform="rotate(0   256 256)"/>
  <rect x="244" y="82"  width="24" height="52" rx="6" fill="#c8a84b" transform="rotate(120 256 256)"/>
  <rect x="244" y="82"  width="24" height="52" rx="6" fill="#c8a84b" transform="rotate(240 256 256)"/>
  <!-- Center bolt -->
  <circle cx="256" cy="256" r="22" fill="#c8a84b"/>
  <circle cx="256" cy="256" r="11" fill="#0f0f0d"/>
</svg>
